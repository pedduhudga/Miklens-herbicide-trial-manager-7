<!DOCTYPE html>
<html>
<head>
    <title>Icon Generator</title>
</head>
<body>
    <h3>PWA Icon Generator</h3>
    <p>This will generate PNG icons from SVG. Open browser dev tools and run the script below:</p>
    
    <script>
    // Icon generator for PWA
    const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
    
    function generateIcon(size) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = size;
        canvas.height = size;
        
        // Create SVG icon
        const svg = `
        <svg width="${size}" height="${size}" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="6" fill="#059669"/>
            <path d="M8 12C8 10.8954 8.89543 10 10 10H22C23.1046 10 24 10.8954 24 12V20C24 21.1046 23.1046 22 22 22H10C8.89543 22 8 21.1046 8 20V12Z" fill="white"/>
            <path d="M10 14H14V18H10V14Z" fill="#059669"/>
            <path d="M16 14H20V16H16V14Z" fill="#059669"/>
            <path d="M16 18H22V20H16V18Z" fill="#059669"/>
        </svg>`;
        
        const img = new Image();
        const svgBlob = new Blob([svg], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(svgBlob);
        
        img.onload = function() {
            ctx.drawImage(img, 0, 0, size, size);
            
            canvas.toBlob(function(blob) {
                const link = document.createElement('a');
                link.download = `icon-${size}x${size}.png`;
                link.href = URL.createObjectURL(blob);
                link.click();
                URL.revokeObjectURL(link.href);
            }, 'image/png');
            
            URL.revokeObjectURL(url);
        };
        
        img.src = url;
    }
    
    // Generate all icon sizes
    function generateAllIcons() {
        sizes.forEach((size, index) => {
            setTimeout(() => generateIcon(size), index * 200);
        });
    }
    
    console.log('Run generateAllIcons() to create all PWA icons');
    </script>
    
    <button onclick="generateAllIcons()">Generate All Icons</button>
    <p><em>Note: Icons will be downloaded to your Downloads folder. Move them to public/icons/ directory.</em></p>
</body>
</html>
